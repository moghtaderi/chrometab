<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Theme toggle -->
  <button id="theme-toggle" class="theme-toggle" title="Toggle light / dark theme">
    <svg id="icon-sun" class="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    <svg id="icon-moon" class="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>
  </button>

  <div class="container">

    <!-- Greeting -->
    <p class="greeting" id="greeting"></p>

    <!-- Clocks -->
    <div class="clocks">
      <div class="clock-card clock-card--pacific">
        <span class="clock-hm" id="clock-pt-hm"></span>
        <div class="clock-meta">
          <span class="clock-sc" id="clock-pt-sc"></span>
          <span class="clock-ap" id="clock-pt-ap"></span>
        </div>
        <span class="clock-tz">Pacific</span>
      </div>
      <div class="clock-sep"></div>
      <div class="clock-card clock-card--eastern">
        <span class="clock-hm" id="clock-et-hm"></span>
        <div class="clock-meta">
          <span class="clock-sc" id="clock-et-sc"></span>
          <span class="clock-ap" id="clock-et-ap"></span>
        </div>
        <span class="clock-tz">Eastern</span>
      </div>
      <div class="clock-sep"></div>
      <div class="clock-card clock-card--tehran">
        <span class="clock-hm" id="clock-th-hm"></span>
        <div class="clock-meta">
          <span class="clock-sc" id="clock-th-sc"></span>
          <span class="clock-ap" id="clock-th-ap"></span>
        </div>
        <span class="clock-tz">Tehran</span>
      </div>
    </div>
    <p class="date-line" id="date-line"></p>

    <!-- Global Search -->
    <div class="search-wrap">
      <div class="search-icon-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      </div>
      <input type="text" id="global-search" class="search-input" placeholder="Search tabs, saved links, videos..." autocomplete="off">
      <div id="search-results" class="search-results" hidden></div>
    </div>

    <!-- ══════ Unified AI Tools Section ══════ -->
    <section class="section ai-section">
      <div class="ai-header">
        <h2 class="section-title">AI Tools</h2>
        <div class="ai-header-actions">
          <button id="add-card-btn" class="ai-action-btn" title="Add a tool">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          </button>
          <button id="launch-all-btn" class="ai-action-btn ai-launch-all" title="Launch all">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
          </button>
        </div>
      </div>

      <!-- Primary subgroup -->
      <div class="ai-subgroup">
        <div class="ai-sub-header">
          <span class="ai-sub-label">Primary</span>
          <button class="ai-sub-launch" data-group="primary" title="Launch primary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </button>
        </div>
        <div class="ai-grid" id="grid-primary" data-group="primary"></div>
      </div>

      <!-- Secondary subgroup -->
      <div class="ai-subgroup">
        <div class="ai-sub-header">
          <span class="ai-sub-label">Secondary</span>
          <button class="ai-sub-launch" data-group="secondary" title="Launch secondary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </button>
        </div>
        <div class="ai-grid" id="grid-secondary" data-group="secondary"></div>
      </div>

      <!-- Tools subgroup -->
      <div class="ai-subgroup">
        <div class="ai-sub-header">
          <span class="ai-sub-label">Tools</span>
          <button class="ai-sub-launch" data-group="tools" title="Launch tools">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </button>
        </div>
        <div class="ai-grid" id="grid-tools" data-group="tools"></div>
      </div>
    </section>

    <!-- Tab Manager -->
    <section class="section">
      <button id="tab-manager-toggle" class="collapse-toggle">
        <span>Tab Manager</span>
        <span class="badge" id="tab-total-count">0</span>
        <span class="collapse-arrow" id="tab-toggle-arrow">&#9660;</span>
      </button>
      <div id="tab-manager-panel" class="collapse-panel">
        <div class="collapse-inner">
          <div class="tm-view-switcher">
            <button class="tm-view-btn active" data-view="domain">By Domain</button>
            <button class="tm-view-btn" data-view="window">By Window / Age</button>
          </div>
          <input type="text" id="tm-search" class="text-input" placeholder="Filter tabs...">
          <div id="tm-content" class="tm-content"></div>
        </div>
      </div>
    </section>

    <!-- Watch Later -->
    <section class="section">
      <button id="watch-later-toggle" class="collapse-toggle">
        <span>Watch Later</span>
        <span class="badge" id="video-count">0</span>
        <span class="collapse-arrow" id="wl-arrow">&#9660;</span>
      </button>
      <div id="watch-later-panel" class="collapse-panel">
        <div class="collapse-inner">
          <form id="add-video-form" class="inline-form">
            <input type="text" id="video-url-input" class="text-input" placeholder="Paste a YouTube URL and press Enter">
            <button type="submit" class="btn-sm">Add</button>
          </form>
          <div id="video-list" class="item-list"></div>
          <p class="empty-msg" id="video-empty">No videos saved yet.</p>
        </div>
      </div>
    </section>

    <!-- Saved Links -->
    <section class="section">
      <button id="saved-links-toggle" class="collapse-toggle">
        <span>Saved Links</span>
        <span class="badge" id="saved-links-count">0</span>
        <span class="collapse-arrow" id="sl-arrow">&#9660;</span>
      </button>
      <div id="saved-links-panel" class="collapse-panel">
        <div class="collapse-inner">
          <div id="saved-links-list" class="item-list"></div>
          <p class="empty-msg" id="saved-links-empty">No saved links yet. Use the Save button in Tab Manager.</p>
        </div>
      </div>
    </section>

    <!-- Export / Import -->
    <section class="section">
      <button id="ei-toggle" class="collapse-toggle">
        <span>Export / Import Tabs</span>
        <span class="collapse-arrow" id="ei-arrow">&#9660;</span>
      </button>
      <div id="ei-panel" class="collapse-panel">
        <div class="collapse-inner">
          <p class="ei-desc">Export all open tabs as a JSON file to open them in another browser or restore later.</p>
          <div class="ei-actions">
            <button id="export-btn" class="btn-primary">Export All Tabs</button>
            <label class="btn-primary btn-file-label">
              Import Tabs
              <input type="file" id="import-input" accept=".json" hidden>
            </label>
          </div>
          <div id="import-preview"></div>
        </div>
      </div>
    </section>

  </div>

  <!-- Add Card Modal -->
  <div id="add-card-modal" class="modal-overlay" hidden>
    <div class="modal">
      <h3 class="modal-title">Add AI Tool</h3>
      <input type="text" id="ac-name" class="text-input" placeholder="Name (e.g. Perplexity)">
      <input type="url" id="ac-url" class="text-input" placeholder="URL (e.g. https://perplexity.ai)">
      <div class="modal-group-picker">
        <label class="modal-radio"><input type="radio" name="ac-group" value="primary" checked> Primary</label>
        <label class="modal-radio"><input type="radio" name="ac-group" value="secondary"> Secondary</label>
        <label class="modal-radio"><input type="radio" name="ac-group" value="tools"> Tools</label>
      </div>
      <div class="modal-actions">
        <button id="ac-cancel" class="btn-sm btn-ghost">Cancel</button>
        <button id="ac-save" class="btn-sm btn-primary">Add</button>
      </div>
    </div>
  </div>

  <script src="newtab.js"></script>
</body>
</html>
