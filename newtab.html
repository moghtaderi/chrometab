<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">

    <!-- Greeting & Clocks -->
    <section class="section section-hero">
      <p class="greeting" id="greeting"></p>
      <div class="clocks">
        <div class="clock">
          <span class="clock-time" id="clock-pt"></span>
          <span class="clock-label">Pacific</span>
        </div>
        <div class="clock-divider"></div>
        <div class="clock">
          <span class="clock-time" id="clock-et"></span>
          <span class="clock-label">Eastern</span>
        </div>
        <div class="clock-divider"></div>
        <div class="clock">
          <span class="clock-time" id="clock-tehran"></span>
          <span class="clock-label">Tehran</span>
        </div>
      </div>
      <p class="clock-date" id="clock-date"></p>
    </section>

    <!-- Primary AIs -->
    <section class="section">
      <div class="section-header">
        <h1 class="title">AI Tools</h1>
        <button id="launch-all-primary" class="launch-all-btn">Launch All</button>
      </div>
      <div class="grid grid-4">
        <a href="https://claude.ai" class="card card-claude" data-group="primary">
          <img class="card-logo" src="https://www.google.com/s2/favicons?domain=claude.ai&sz=128" alt="Claude logo">
          <span class="card-label">Claude</span>
        </a>
        <a href="https://chatgpt.com" class="card card-chatgpt" data-group="primary">
          <img class="card-logo" src="https://www.google.com/s2/favicons?domain=chatgpt.com&sz=128" alt="ChatGPT logo">
          <span class="card-label">ChatGPT</span>
        </a>
        <a href="https://gemini.google.com" class="card card-gemini" data-group="primary">
          <img class="card-logo" src="https://www.google.com/s2/favicons?domain=gemini.google.com&sz=128" alt="Gemini logo">
          <span class="card-label">Gemini</span>
        </a>
        <a href="https://grok.com" class="card card-grok" data-group="primary">
          <img class="card-logo" src="https://www.google.com/s2/favicons?domain=grok.com&sz=128" alt="Grok logo">
          <span class="card-label">Grok</span>
        </a>
      </div>
    </section>

    <!-- Secondary AIs -->
    <section class="section">
      <div class="section-header">
        <h2 class="title title-secondary">Secondary</h2>
        <button id="launch-all-secondary" class="launch-all-btn launch-all-btn-secondary">Launch All</button>
      </div>
      <div class="grid grid-4">
        <a href="https://chat.deepseek.com" class="card card-deepseek" data-group="secondary">
          <img class="card-logo" src="https://www.google.com/s2/favicons?domain=chat.deepseek.com&sz=128" alt="DeepSeek logo">
          <span class="card-label">DeepSeek</span>
        </a>
        <a href="https://agent.minimax.io/" class="card card-minimax" data-group="secondary">
          <img class="card-logo" src="https://www.google.com/s2/favicons?domain=agent.minimax.io&sz=128" alt="MiniMax logo">
          <span class="card-label">MiniMax</span>
        </a>
        <a href="https://chat.qwen.ai" class="card card-qwen" data-group="secondary">
          <img class="card-logo" src="https://www.google.com/s2/favicons?domain=chat.qwen.ai&sz=128" alt="Qwen logo">
          <span class="card-label">Qwen</span>
        </a>
        <a href="https://z.ai" class="card card-zai" data-group="secondary">
          <img class="card-logo" src="https://www.google.com/s2/favicons?domain=z.ai&sz=128" alt="Z AI logo">
          <span class="card-label">Z AI</span>
        </a>
      </div>
    </section>

    <!-- Notebook LM -->
    <section class="section">
      <div class="section-header">
        <h2 class="title title-secondary">Tools</h2>
      </div>
      <div class="grid grid-single">
        <a href="https://notebooklm.google.com/" class="card card-notebooklm">
          <img class="card-logo" src="https://www.google.com/s2/favicons?domain=notebooklm.google.com&sz=128" alt="NotebookLM logo">
          <span class="card-label">NotebookLM</span>
        </a>
      </div>
    </section>

    <!-- Tab Manager -->
    <section class="section">
      <button id="tab-manager-toggle" class="collapsible-toggle">
        <span class="toggle-title">Tab Manager</span>
        <span class="toggle-count" id="tab-total-count">0</span>
        <span class="toggle-arrow" id="tab-toggle-arrow">&#9660;</span>
      </button>

      <div id="tab-manager-panel" class="collapsible-panel">
        <div class="collapsible-inner">
          <!-- View switcher -->
          <div class="tm-view-switcher">
            <button class="tm-view-btn active" data-view="domain">By Domain</button>
            <button class="tm-view-btn" data-view="window">By Window / Age</button>
          </div>

          <!-- Search / filter -->
          <input type="text" id="tm-search" class="video-input tm-search" placeholder="Filter tabs...">

          <!-- Content area -->
          <div id="tm-content" class="tm-content"></div>
        </div>
      </div>
    </section>

    <!-- Watch Later YouTube Videos -->
    <section class="section section-watch-later">
      <button id="watch-later-toggle" class="collapsible-toggle">
        <span class="toggle-title">Watch Later</span>
        <span class="toggle-count" id="video-count">0</span>
        <span class="toggle-arrow" id="toggle-arrow">&#9660;</span>
      </button>

      <div id="watch-later-panel" class="collapsible-panel">
        <div class="collapsible-inner">
          <!-- Add video form -->
          <form id="add-video-form" class="add-video-form">
            <input type="text" id="video-url-input" class="video-input" placeholder="Paste a YouTube URL and press Enter">
            <button type="submit" class="video-add-btn">Add</button>
          </form>

          <!-- Video list -->
          <div id="video-list" class="video-list"></div>

          <p class="video-empty" id="video-empty">No videos saved yet. Paste a YouTube link above to get started.</p>
        </div>
      </div>
    </section>

    <!-- Saved Links -->
    <section class="section">
      <button id="saved-links-toggle" class="collapsible-toggle">
        <span class="toggle-title">Saved Links</span>
        <span class="toggle-count" id="saved-links-count">0</span>
        <span class="toggle-arrow" id="saved-links-arrow">&#9660;</span>
      </button>

      <div id="saved-links-panel" class="collapsible-panel">
        <div class="collapsible-inner">
          <div id="saved-links-list" class="saved-list"></div>
          <p class="saved-empty" id="saved-links-empty">No saved links yet. Use the save button in the Tab Manager to bookmark tabs.</p>
        </div>
      </div>
    </section>

  </div>
  <script src="newtab.js"></script>
</body>
</html>
